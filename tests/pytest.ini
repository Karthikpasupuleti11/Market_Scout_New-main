[pytest]
# ═══════════════════════════════════════════════════════════════════════════════
#  Market Scout — Master pytest configuration
#  All test categories live under tests/<category>/
# ═══════════════════════════════════════════════════════════════════════════════

# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --no-header
    --color=yes
    --strict-markers

# ── Markers (one per test category) ────────────────────────────────────────────
markers =
    unit:        Pure, isolated unit tests — no external services
    integration: Tests that wire two or more real modules together
    api:         FastAPI endpoint contract tests (TestClient)
    security:    OWASP / input-validation / injection tests
    ai_llm:      Tests for LLM client and prompt helpers (mocked)
    e2e:         End-to-end pipeline flow tests (mocked I/O)
    load:        Throughput / concurrency / stress tests
    regression:  Known-bug regression guards
    chaos:       Fault-injection / resilience tests

# ── Logging ────────────────────────────────────────────────────────────────────
log_cli = false
log_level = WARNING
