global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "market-scout"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "market-intelligence-scout"
          environment: "production"

  - job_name: "market-scout-worker"
    metrics_path: "/"
    static_configs:
      - targets: ["market_celery_worker:8001"]
        labels:
          service: "market-intelligence-scout"
          component: "celery_worker"
          environment: "production"
