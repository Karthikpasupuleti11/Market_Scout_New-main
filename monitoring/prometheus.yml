global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "market-scout"
    metrics_path: "/metrics/"
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "market-intelligence-scout"
          environment: "development"

  - job_name: "flower"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["flower:5555"]
        labels:
          service: "celery-flower"
          environment: "development"
