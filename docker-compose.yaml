version: '3.8'

services:
  # ── Application ────────────────────────────────────────────────
  app:
    build: .
    container_name: market_scout_app
    command: >
      sh -c "mkdir -p /tmp/prometheus_multiproc &&
      find /tmp/prometheus_multiproc -mindepth 1 -type f -delete 2>/dev/null;
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENABLE_SCHEDULER=False
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - scout_net
    
  # ── Celery Worker ─────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: market_celery_worker

    command: celery -A app.celery_app worker --loglevel=info --concurrency=1

    ports:
      - "9100:9100"

    env_file: .env

    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

    networks:
      - scout_net

# ── Flower Monitoring ─────────────────────────────────────────
  flower:
    build: .
    container_name: market_flower

    command: celery -A app.celery_app flower --port=5555

    ports:
      - "5555:5555"

    env_file: .env

    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      - redis
      - celery_worker

    restart: unless-stopped

    networks:
      - scout_net

  # ── Celery Worker ───────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: market_celery_worker
    command: >
      sh -c "mkdir -p /tmp/prometheus_multiproc &&
      find /tmp/prometheus_multiproc -mindepth 1 -type f -delete 2>/dev/null;
      celery -A celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      --without-heartbeat
      -Q celery"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENABLE_SCHEDULER=False
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - scout_net

  # ── Flower (Celery Monitoring) ──────────────────────────────────
  flower:
    build: .
    container_name: market_flower
    command: >
      celery -A celery_app flower
      --port=5555
      --broker=redis://redis:6379/1
      --broker_api=redis://redis:6379/1
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped
    networks:
      - scout_net

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: market_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: market_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d market_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scout_net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - scout_net

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: market_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - scout_net

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: market_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - scout_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  prometheus_multiproc:
  grafana_data:

networks:
  scout_net:
    driver: bridge
