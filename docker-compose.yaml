version: '3.8'

services:
  # ── Application ────────────────────────────────────────────────
  app:
    build: .
    container_name: market_scout_app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ENABLE_SCHEDULER=False     # standalone scheduler service owns it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout_net

  # ── Standalone APScheduler ─────────────────────────────────────
  scheduler:
    build: .
    container_name: market_scheduler
    command: python -m scheduler.runner
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout_net

  # ── Celery Worker — pipeline + scheduled queues ───────────────
  celery_worker:
    build: .
    container_name: market_celery_worker
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --pool=threads
      --concurrency=${CELERY_PIPELINE_CONCURRENCY:-8}
      --queues=pipeline,scheduled
      --hostname=worker.pipeline@%h
    env_file: .env
    expose:
      - "9100"     # Prometheus metrics port (internal network only)
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - WORKER_METRICS_PORT=9100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d worker.pipeline@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - scout_net

  # ── Celery Worker — maintenance queue (light) ─────────────────
  celery_worker_maint:
    build: .
    container_name: market_celery_worker_maint
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --pool=threads
      --concurrency=1
      --queues=maintenance
      --hostname=worker.maint@%h
    env_file: .env
    expose:
      - "9100"
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/market_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - WORKER_METRICS_PORT=9100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout_net

  # ── Celery Beat — periodic task dispatcher ────────────────────
  celery_beat:
    build: .
    container_name: market_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - scout_net

  # ── Flower — Celery monitoring UI ─────────────────────────────
  flower:
    build: .
    container_name: market_flower
    command: >
      celery -A app.celery_app flower
      --port=5555
      --broker=redis://redis:6379/0
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped
    networks:
      - scout_net

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: market_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: market_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d market_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scout_net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: market_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - scout_net

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: market_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - scout_net

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: market_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

      # Reverse proxy / domain
      - GF_SERVER_ROOT_URL=https://grafana.market-scout.me
      - GF_SERVER_DOMAIN=grafana.market-scout.me
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_LIVE_ALLOWED_ORIGINS=https://grafana.market-scout.me https://market-scout.me https://www.market-scout.me

      # Embedding + cross-site cookies (for iframe use)
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=none
      - GF_SECURITY_COOKIE_SECURE=true

      # Anonymous viewer — fixes Live WS 401 for logged-out users
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_HIDE_VERSION=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - scout_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  scout_net:
    driver: bridge
